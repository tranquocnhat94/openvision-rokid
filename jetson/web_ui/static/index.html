<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenVision Jetson Ops</title>
    <link rel="stylesheet" href="/style.css?v=20260424-debug-stt1" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="eyebrow">OpenVision Rokid v2</div>
        <h1>Jetson Ops Console</h1>
      </div>
      <div class="status-row">
        <span id="healthChip" class="chip muted">Checking</span>
        <a class="link-button" href="/simulator/" target="_blank" rel="noreferrer">Simulator</a>
        <button id="refreshButton" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <section class="band span-2">
        <div class="section-head">
          <h2>Sessions</h2>
          <div class="actions">
            <button id="rv101Button" type="button">New RV101</button>
            <button id="iphoneButton" type="button">New iPhone</button>
          </div>
        </div>
        <div id="sessions" class="grid-list"></div>
      </section>

      <section class="band">
        <div class="section-head">
          <h2>Realtime</h2>
          <div class="actions">
            <label class="inline-toggle">
              <input id="voiceOutputToggle" type="checkbox" />
              <span>Voice</span>
            </label>
            <button id="startRealtimeButton" type="button">Start</button>
            <button id="textRealtimeButton" type="button">Text Test</button>
          </div>
        </div>
        <dl class="facts" id="healthFacts"></dl>
        <div id="realtimeList" class="mini-list"></div>
      </section>

      <section class="band">
        <div class="section-head">
          <h2>HUD Mirror</h2>
          <button id="hudButton" type="button">Test</button>
        </div>
        <div class="hud-preview">
          <div id="hudThumbs" class="hud-thumbs"></div>
          <div id="hudAnswer" class="hud-answer">Waiting</div>
          <div id="hudChips" class="hud-chips"></div>
        </div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>Debug STT</h2>
          <button id="warmDebugSttButton" type="button">Warm</button>
        </div>
        <div id="debugStt" class="debug-stt"></div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>Sensor Preview</h2>
        </div>
        <div id="previewList" class="preview-list"></div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>Media</h2>
        </div>
        <div id="mediaList" class="grid-list"></div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>RV101 Ingest</h2>
        </div>
        <div id="rv101Ingest" class="grid-list"></div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>Perception</h2>
          <button id="samplePerceptionButton" type="button">Sample Snapshot</button>
        </div>
        <div id="perceptionList" class="grid-list"></div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>Adapters</h2>
        </div>
        <div id="yolo26Adapter" class="grid-list"></div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>Skills</h2>
          <div class="actions">
            <button id="dryRunButton" type="button">Dry Run Count</button>
            <button id="executeCountButton" type="button">Execute Count</button>
          </div>
        </div>
        <div id="skills" class="skill-list"></div>
      </section>

      <section class="band span-2">
        <div class="section-head">
          <h2>Live Trace</h2>
        </div>
        <div id="events" class="events"></div>
      </section>
    </main>

    <script src="/app.js?v=20260424-debug-stt1" defer></script>
  </body>
</html>
