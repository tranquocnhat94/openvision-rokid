<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>OpenVision Simulator</title>
    <link rel="stylesheet" href="/simulator/simulator.css?v=20260424-agent-trace1" />
  </head>
  <body>
    <main class="sim">
      <video id="preview" autoplay muted playsinline></video>
      <div class="top">
        <span id="stateChip">Idle</span>
      </div>
      <div id="hudChips" class="hud-chips"></div>
      <div id="hudThumbs" class="hud-thumbs"></div>
      <div id="hudAnswer" class="hud-answer">OpenVision</div>
      <label class="voice-toggle">
        <input id="voiceToggle" type="checkbox" />
        <span>Voice</span>
      </label>
      <button id="startButton" class="start" type="button">Start</button>
    </main>
    <script src="/simulator/simulator.js?v=20260424-agent-trace1" defer></script>
  </body>
</html>
